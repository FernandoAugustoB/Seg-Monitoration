<div class="min-h-screen bg-(--brand-black) flex items-center justify-center font-sans p-4">
  <div class="max-w-md w-full bg-(--brand-dark) border border-brand-gray rounded-xl p-8 shadow-2xl">

    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-(--brand-primary)/10 rounded-full mb-4">
        <i class="pi pi-shield text-(--brand-primary) text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Vanguard Sec</h1>
      <p class="text-gray-400 mt-2">Acesse sua conta para iniciar o plantão</p>
    </div>

    <form (submit)="onLogin()" class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Usuário</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
            <i class="pi pi-user"></i>
          </span>
          <input type="text" [(ngModel)]="username" name="username" placeholder="Digite seu usuário"
            class="w-full bg-(--brand-black) border border-(--brand-gray) text-white rounded-lg pl-10 pr-4 py-3 focus:border-(--brand-primary) focus:ring-1 focus:ring-(--brand-primary) outline-none transition-all">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Senha</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
            <i class="pi pi-lock"></i>
          </span>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Digite sua senha"
            class="w-full bg-(--brand-black) border border-(--brand-gray) text-white rounded-lg pl-10 pr-4 py-3 focus:border-(--brand-primary) focus:ring-1 focus:ring-(--brand-primary) outline-none transition-all">
        </div>
      </div>

      @if (errorMessage) {
      <div class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg flex items-center gap-2">
        <i class="pi pi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>
      }

      <button type="submit"
        class="w-full bg-(--brand-primary) hover:bg-(--brand-primary-hover) text-black font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 cursor-pointer">
        <span>Entrar no Sistema</span>
        <i class="pi pi-arrow-right"></i>
      </button>

    </form>

    <div class="mt-8 text-center">
      <p class="text-xs text-gray-500">
        V 1.0.0 Demo - Acesso Restrito a Colaboradores
      </p>
    </div>

  </div>
</div>
