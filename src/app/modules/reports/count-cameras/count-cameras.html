<div class="space-y-6 font-sans">
  
  <div class="flex justify-between items-end">
    <div>
      <h1 class="text-2xl font-bold text-white">Contagem de Câmeras</h1>
      <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Verificação de disponibilidade e status online</p>
    </div>
    
    <button 
      (click)="copyReport()"
      class="bg-(--brand-primary) hover:bg-yellow-600 text-black px-4 py-2 rounded-lg font-bold text-xs transition-all flex items-center gap-2"
    >
      <i class="pi pi-copy"></i>
      Copiar Relatório
    </button>
  </div>

  <div class="flex flex-col md:flex-row justify-between gap-4 items-center bg-(--brand-dark) p-2 rounded-xl border border-(--brand-gray)">
    <div class="flex gap-2 p-1 bg-(--brand-black) rounded-lg">
      <button 
        (click)="setTab('privado')"
        [class.bg-(--brand-gray)]="activeTab() === 'privado'"
        [class.text-white]="activeTab() === 'privado'"
        class="px-6 py-1.5 rounded-md text-xs font-bold transition-all text-gray-500 hover:text-white"
      >
        Privado
      </button>
      <button 
        (click)="setTab('publico')"
        [class.bg-(--brand-gray)]="activeTab() === 'publico'"
        [class.text-white]="activeTab() === 'publico'"
        class="px-6 py-1.5 rounded-md text-xs font-bold transition-all text-gray-500 hover:text-white"
      >
        Público
      </button>
    </div>

    <div class="relative w-full md:w-80">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
      <input 
        [(ngModel)]="searchQuery"
        type="text" 
        placeholder="Filtrar local..." 
        class="w-full bg-(--brand-black) border border-(--brand-gray) text-white text-xs rounded-lg pl-9 pr-4 py-2 focus:border-(--brand-primary) outline-none transition-all"
      >
    </div>
  </div>

  <div class="bg-(--brand-dark) border border-(--brand-gray) rounded-xl overflow-hidden shadow-2xl">
    <table class="w-full text-left">
      <thead class="bg-(--brand-black)/60 text-gray-500 text-[10px] uppercase tracking-[0.2em] border-b border-(--brand-gray)">
        <tr>
          <th class="px-6 py-4 font-bold text-gray-400">Localização / Ponto</th>
          <th class="px-6 py-4 text-center w-24">Celular</th>
          <th class="px-6 py-4 text-center w-24">PC</th>
          <th class="px-6 py-4 text-center w-24">Online</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-(--brand-gray)/40">
        @for (item of filteredData(); track item.id) {
          <tr class="hover:bg-(--brand-gray)/10 transition-colors">
            <td class="px-6 py-4">
              <span class="text-sm font-medium text-gray-200">{{ item.location }}</span>
            </td>
            
            <td class="px-6 py-4 text-center">
              <input 
                type="checkbox" 
                [(ngModel)]="item.mobile"
                class="w-4 h-4 accent-(--brand-primary) bg-(--brand-black) border-(--brand-gray) rounded"
              >
            </td>

            <td class="px-6 py-4 text-center">
              <input 
                type="checkbox" 
                [(ngModel)]="item.pc"
                class="w-4 h-4 accent-(--brand-primary) bg-(--brand-black) border-(--brand-gray) rounded"
              >
            </td>

            <td class="px-6 py-4 text-center">
              <div class="flex justify-center">
                <input 
                  type="checkbox" 
                  [(ngModel)]="item.online"
                  [class.accent-green-500]="item.online"
                  [class.accent-red-500]="!item.online"
                  class="w-5 h-5 rounded-full cursor-pointer appearance-none border-2 border-(--brand-gray) checked:bg-current transition-all"
                >
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>

    <div class="p-4 bg-(--brand-black)/20 border-t border-(--brand-gray) flex justify-between items-center text-[10px] text-gray-500 uppercase font-bold">
      <span>Exibindo {{ filteredData().length }} registros</span>
      <div class="flex gap-2">
        <button class="px-3 py-1 bg-(--brand-gray)/30 rounded hover:bg-(--brand-gray) transition-all">Anterior</button>
        <button class="px-3 py-1 bg-(--brand-gray)/30 rounded hover:bg-(--brand-gray) transition-all">Próximo</button>
      </div>
    </div>
  </div>
</div>
