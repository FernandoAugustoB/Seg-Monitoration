<div class="grid grid-cols-1 xl:grid-cols-3 gap-6 font-sans">
  
  <div class="xl:col-span-2 space-y-6">
    <!-- Lista de Clientes em Verificação -->
    @for (client of clientsVerification(); track client.id) {
      <div class="bg-(--brand-dark) border border-(--brand-gray) rounded-xl overflow-hidden" [class.opacity-40]="client.ignored">
        
        <!-- Header do Cliente -->
        <div class="p-4 bg-(--brand-black)/40 flex justify-between items-center border-b border-(--brand-gray)">
          <div class="flex items-center gap-3">
            <h3 class="text-sm font-bold text-white uppercase">{{ client.clientName }}</h3>
            <span class="text-[10px] text-gray-500 font-mono">{{ client.occurrences.length }} Ocorrência(s)</span>
          </div>
          <div class="flex gap-2">
            <button (click)="client.ignored = !client.ignored" class="text-[10px] font-bold uppercase px-3 py-1 rounded border border-(--brand-gray) hover:bg-red-500/20">
              {{ client.ignored ? 'Reativar Cliente' : 'Ignorar Cliente' }}
            </button>
            <button (click)="addOccurrence(client.id)" class="text-[10px] font-bold uppercase px-3 py-1 bg-(--brand-primary) text-black rounded hover:bg-yellow-600">
              + Câmera
            </button>
          </div>
        </div>

        <!-- Lista de Câmeras do Cliente -->
        <div class="p-4 space-y-4">
          @for (occ of client.occurrences; track occ.id) {
            <div class="bg-(--brand-black) border border-(--brand-gray)/50 rounded-lg p-4 relative" [class.opacity-40]="occ.ignored || occ.treated">
              
              <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1">
                  <label class="text-[9px] font-bold text-gray-600 uppercase">Câmera</label>
                  <input [(ngModel)]="occ.cameraName" class="w-full bg-(--brand-dark) border border-(--brand-gray) rounded p-1.5 text-xs text-white">
                </div>
                <div class="space-y-1 md:col-span-2">
                  <label class="text-[9px] font-bold text-gray-600 uppercase">Ocorrência</label>
                  <input [(ngModel)]="occ.issue" placeholder="Ex: Parou de funcionar" class="w-full bg-(--brand-dark) border border-(--brand-gray) rounded p-1.5 text-xs text-white">
                </div>
                <div class="flex items-end gap-2">
                  <button (click)="occ.ignored = !occ.ignored" class="flex-1 p-1.5 border border-(--brand-gray) rounded text-[9px] font-bold uppercase hover:bg-red-500/10">Ignorar</button>
                  <button (click)="removeOccurrence(client.id, occ.id)" class="p-1.5 text-gray-600 hover:text-red-500 transition-colors"><i class="pi pi-trash"></i></button>
                </div>

                <div class="space-y-1">
                  <label class="text-[9px] font-bold text-gray-600 uppercase">Desde</label>
                  <input [(ngModel)]="occ.since" placeholder="00/00 às 00:00" class="w-full bg-(--brand-dark) border border-(--brand-gray) rounded p-1.5 text-xs text-white">
                </div>
                <div class="space-y-1">
                  <label class="text-[9px] font-bold text-gray-600 uppercase">Motivo</label>
                  <input [(ngModel)]="occ.reason" class="w-full bg-(--brand-dark) border border-(--brand-gray) rounded p-1.5 text-xs text-white">
                </div>

                <!-- Campo de Tratativa -->
                <div class="md:col-span-2 flex items-center gap-3 mt-2">
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" [(ngModel)]="occ.treated" class="accent-green-500">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Tratado</span>
                  </label>
                  @if (occ.treated) {
                    <input [(ngModel)]="occ.treatmentNotes" placeholder="Como foi tratado?" class="flex-1 bg-green-500/5 border border-green-500/20 rounded p-1.5 text-xs text-green-200 outline-none">
                  }
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>

  <!-- Preview WhatsApp (Sticky) -->
  <div class="space-y-4">
    <div class="bg-(--brand-dark) border border-(--brand-gray) rounded-xl p-6 sticky top-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2">
          <i class="pi pi-whatsapp text-green-500"></i> Relatório Final
        </h3>
        <button (click)="copyReport()" class="bg-(--brand-primary) text-black px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-yellow-600">Copiar</button>
      </div>

      <div class="bg-[#0b141a] rounded-lg p-5 font-mono text-xs text-[#e9edef] whitespace-pre-wrap border border-(--brand-gray)/30 h-[500px] overflow-y-auto">
        {{ generatedText() }}
      </div>
    </div>
  </div>
</div>
