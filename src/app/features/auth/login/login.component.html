<div class="min-h-screen flex items-center justify-center bg-gradient-to-b from-black to-slate-900">
  <div class="w-full max-w-md">
    <div class="bg-slate-800 rounded-lg shadow-2xl p-8 border border-yellow-600/30">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-yellow-500 mb-2">SegMonitor</h1>
        <p class="text-slate-400">Sistema de Monitoração de Segurança</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="login()" class="space-y-4">
        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Usuário</label>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/20 transition"
            placeholder="Digite seu usuário"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/20 transition"
            placeholder="Digite sua senha"
          />
        </div>

        <!-- Error Message -->
        <div *ngIf="error" class="bg-red-900/30 border border-red-600 rounded-lg p-3 text-red-400 text-sm">
          {{ error }}
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-yellow-600 hover:bg-yellow-700 disabled:bg-yellow-600/50 text-black font-semibold py-2 px-4 rounded-lg transition duration-200"
        >
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-6 p-4 bg-slate-700/50 rounded-lg border border-slate-600">
        <p class="text-xs text-slate-400 text-center">
          <strong>Dados de teste:</strong><br />
          Operador: operador1 / operador2<br />
          Supervisor: supervisor<br />
          Senha: 123456
        </p>
      </div>
    </div>
  </div>
</div>
